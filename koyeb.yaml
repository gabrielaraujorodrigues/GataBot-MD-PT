name: gatabot-md
services:
  - name: bot
    type: web
    git:
      repository: github.com/gabrielaraujorodrigues/GataBot-MD-PT
      branch: main
    docker:
      dockerfile: Dockerfile
    instance_type: nano
    ports:
      - port: 8000
        protocol: http
    health_checks:
      - grace_period: 60
        interval: 30
        restart_limit: 3
        timeout: 5
        port: 8000
        protocol: http
        path: /
    env:
      - key: PORT
        value: "8000"
      - key: NODE_ENV
        value: production
